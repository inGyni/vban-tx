name: Build VST3 (Win/Linux/macOS)

on:
  push:
    tags:
      - '*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version (example: 1.0.0)'
        required: true
      notes:
        description: 'Release notes (optional)'
        required: false

env:
  BUILD_TYPE: Release
  PLUGIN_VERSION: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.version || github.ref_name }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: windows
            generator: "Visual Studio 17 2022"
            arch: x64
          - os: ubuntu-latest
            name: linux
          - os: macos-latest
            name: macos

    runs-on: ${{ matrix.os }}

    steps:
    # -------------------- Checkout --------------------
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    # -------------------- Install JUCE dependencies (Linux) --------------------
    - name: Install JUCE dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config cmake g++ \
          libasound2-dev libfreetype6-dev libfontconfig1-dev \
          libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
          libxinerama-dev libxrandr-dev libxrender-dev \
          libglu1-mesa-dev mesa-common-dev


    # -------------------- Create dist folder --------------------
    - name: Ensure dist folder exists
      run: mkdir -p dist
      shell: bash

    # -------------------- Configure --------------------
    - name: Configure (Windows)
      if: runner.os == 'Windows'
      shell: cmd
      run: cmake -S . -B build -G "${{ matrix.generator }}" -A ${{ matrix.arch }} -DPLUGIN_VERSION="${{ env.PLUGIN_VERSION }}"

    - name: Configure (Linux/macOS)
      if: runner.os != 'Windows'
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DPLUGIN_VERSION="${{ env.PLUGIN_VERSION }}"

    # -------------------- Build --------------------
    - name: Build (Windows)
      if: runner.os == 'Windows'
      run: cmake --build build --config ${{ env.BUILD_TYPE }}

    - name: Build (Linux/macOS)
      if: runner.os != 'Windows'
      run: cmake --build build

    # -------------------- Zip Plugin Bundle --------------------
    - name: Zip Plugin Bundle (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: Compress-Archive -Path dist\* -DestinationPath vban-tx-${{ matrix.name }}-v${{ env.PLUGIN_VERSION }}.zip
    - name: Zip Plugin Bundle (Linux/macOS)
      if: runner.os != 'Windows'
      run: zip -r vban-tx-${{ matrix.name }}-v${{ env.PLUGIN_VERSION }}.zip dist

    # -------------------- Upload Artifact --------------------
    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
        name: vban-tx-${{ matrix.name }}
        path: vban-tx-${{ matrix.name }}-v${{ env.PLUGIN_VERSION }}.zip

  release:
      needs: build
      runs-on: ubuntu-latest
      permissions:
        contents: write

      steps:
        - uses: actions/checkout@v4
          with:
            fetch-depth: 0   # needed for tag messages

        - name: Download all artifacts
          uses: actions/download-artifact@v4
          with:
            path: dist/

        - name: Get release body
          run: |
            if [ "${GITHUB_EVENT_NAME}" = "push" ]; then
              BODY=$(git tag -l --format='%(contents)' $GITHUB_REF_NAME)
            else
              BODY="${{ github.event.inputs.notes }}"
            fi
            echo "RELEASE_BODY=${BODY}" >> $GITHUB_ENV

        - name: Create Release and Upload Assets
          uses: softprops/action-gh-release@v1
          with:
            tag_name: v${{ env.PLUGIN_VERSION }}    # prepend v here only
            name: v${{ env.PLUGIN_VERSION }}
            body: ${{ env.RELEASE_BODY || 'Release notes not available' }}
            files: dist/**/*.zip
          env:
            GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}