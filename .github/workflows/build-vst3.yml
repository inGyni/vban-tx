name: Build VST3 (Win/Linux/macOS)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  BUILD_TYPE: Release
  PLUGIN_VERSION: ${{ github.run_number }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            name: windows
            generator: "Visual Studio 17 2022"
            arch: x64
          - os: ubuntu-latest
            name: linux
          - os: macos-latest
            name: macos

    runs-on: ${{ matrix.os }}

    steps:
    # -------------------- Checkout --------------------
    - uses: actions/checkout@v4
      with:
        submodules: recursive

    # -------------------- Install JUCE dependencies (Linux) --------------------
    - name: Install JUCE dependencies (Linux)
      if: runner.os == 'Linux'
      run: |
        sudo apt-get update
        sudo apt-get install -y pkg-config cmake g++ \
          libasound2-dev libfreetype6-dev libfontconfig1-dev \
          libx11-dev libxcomposite-dev libxcursor-dev libxext-dev \
          libxinerama-dev libxrandr-dev libxrender-dev \
          libglu1-mesa-dev mesa-common-dev

    # -------------------- Configure --------------------
    - name: Configure (Windows)
      if: runner.os == 'Windows'
      run: cmake -S . -B build -G "${{ matrix.generator }}" -A ${{ matrix.arch }} -DPLUGIN_VERSION=${{ env.PLUGIN_VERSION }}

    - name: Configure (Linux/macOS)
      if: runner.os != 'Windows'
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=${{ env.BUILD_TYPE }} -DPLUGIN_VERSION=${{ env.PLUGIN_VERSION }}

    # -------------------- Build --------------------
    - name: Build (Windows)
      if: runner.os == 'Windows'
      run: cmake --build build --config ${{ env.BUILD_TYPE }}

    - name: Build (Linux/macOS)
      if: runner.os != 'Windows'
      run: cmake --build build

    # -------------------- Zip Plugin Bundle --------------------
    - name: Zip Plugin Bundle (Windows)
      if: runner.os == 'Windows'
      shell: powershell
      run: Compress-Archive -Path dist\* -DestinationPath vban-tx-${{ matrix.name }}-v${{ env.PLUGIN_VERSION }}.zip
    - name: Zip Plugin Bundle (Linux/macOS)
      if: runner.os != 'Windows'
      run: zip -r vban-tx-${{ matrix.name }}-v${{ env.PLUGIN_VERSION }}.zip dist
    
    # -------------------- Create Release --------------------
    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: v${{ env.PLUGIN_VERSION }}
        release_name: v${{ env.PLUGIN_VERSION }}
        draft: false
        prerelease: false
        body: |
          Build for ${{ matrix.name }}
          Commit: `${{ github.sha }}`

    # -------------------- Upload Release Asset --------------------
    - name: Upload Release Asset
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: vban-tx-${{ matrix.name }}-v${{ env.PLUGIN_VERSION }}.zip
        asset_name: vban-tx-${{ matrix.name }}-v${{ env.PLUGIN_VERSION }}.zip
        asset_content_type: application/zip